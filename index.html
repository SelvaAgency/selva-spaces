<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELVA SPACE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --scene-scale:1;
  --tx:0deg;--ty:0deg;
  --mx:50%;--my:50%;
}
body{
  width:100vw;height:100vh;overflow:hidden;
  font-family:"Inter",sans-serif;
  background:#060810;
  display:flex;flex-direction:column;
}

/* HEADER */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,4vw,40px);height:clamp(54px,9vw,64px);
  border-bottom:0.5px solid rgba(253,255,237,0.08);
  background:rgba(6,8,16,0.7);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  opacity:0;animation:headerIn 1s ease-out forwards;animation-delay:1.5s;
}
@keyframes headerIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.header-logo{display:flex;align-items:center}
.header-logo svg{height:clamp(18px,3.2vw,28px);width:auto}
.header-right{
  font-size:clamp(8px,1.6vw,10px);letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(253,255,237,0.3);font-weight:200;white-space:nowrap;
}
.header-right a{
  color:rgba(253,255,237,0.45);text-decoration:none;
  border-bottom:0.5px solid rgba(253,255,237,0.2);padding-bottom:1px;
  transition:color 0.3s;
}
.header-right a:hover{color:#FDFFED}

/* GRAIN cinematográfico sobre toda a página, como nos posters de referência */
.grain{
  position:fixed;inset:0;z-index:90;pointer-events:none;
  opacity:0.085;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  animation:grainshift 1s steps(4) infinite;
}
@keyframes grainshift{0%{transform:translate(0,0)}25%{transform:translate(-1.5%,1.5%)}50%{transform:translate(1.5%,-1%)}75%{transform:translate(-1%,1%)}100%{transform:translate(0,0)}}

/* INTRO — sensação de aproximação que se FUNDE no site, sem corte */
.intro{
  position:fixed;inset:0;z-index:200;background:#060810;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  opacity:1;animation:introOut 1.15s ease-out forwards;animation-delay:1.3s;
}
.intro-core{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle, #FDFFED 0%, rgba(239,112,27,0.6) 40%, transparent 74%);
  animation:introCore 1.3s cubic-bezier(.22,.7,.2,1) forwards;
  filter:blur(1px);
}
@keyframes introCore{
  0%{transform:scale(0.04);opacity:0.45;filter:blur(9px)}
  100%{transform:scale(1);opacity:1;filter:blur(2px)}
}
.intro-flare{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 50% 50%, rgba(253,255,237,0.5), rgba(239,112,27,0.15) 32%, transparent 64%);
  opacity:0;animation:introFlare 1.3s ease-in forwards;
}
@keyframes introFlare{0%,55%{opacity:0}78%{opacity:0.45}100%{opacity:0.18}}
@keyframes introOut{to{opacity:0;visibility:hidden}}
@media (prefers-reduced-motion: reduce){
  .intro{display:none}
  header,.dock,.scene-content{opacity:1 !important;animation:none !important;transform:none !important}
}

/* CENA PRINCIPAL */
.scene{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:inset 0 0 180px 50px rgba(0,0,0,0.55);
}
.scene::before{
  content:'';position:absolute;inset:-15%;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 45% at 74% 28%, rgba(239,112,27,0.16) 0%, transparent 60%),
    radial-gradient(ellipse 55% 60% at 50% 45%, rgba(45,100,45,0.3) 0%, rgba(25,70,30,0.12) 40%, transparent 70%),
    radial-gradient(ellipse 80% 70% at 50% 50%, rgba(12,28,70,0.5) 0%, transparent 85%);
  animation:nebulabreathe 50s ease-in-out infinite;
}
@keyframes nebulabreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08) rotate(2deg)}}

/* poeira cósmica flutuando — dá vida orgânica à cena */
.dust{position:absolute;inset:0;z-index:2;pointer-events:none;}
.dust-p{position:absolute;border-radius:50%;pointer-events:none;}
@keyframes dustfloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(36px,-26px)}}
@keyframes dustfloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-32px,22px)}}
@keyframes dustfloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(22px,30px)}}

/* campo de estrelas com drift lento, independente da escala da cena */
.starfield{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  animation:starfielddrift 240s linear infinite;
}
@keyframes starfielddrift{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.star{position:absolute;background:#fff;border-radius:50%;pointer-events:none;transition:transform 0.45s cubic-bezier(.2,.8,.2,1);}

/* wrapper que carrega TODA a cena orbital — escala/inclina como um bloco só, e se materializa junto com o fim da intro */
.scene-content{
  position:absolute;inset:0;z-index:5;
  transform-style:preserve-3d;
  transform:perspective(1400px) rotateX(var(--ty)) rotateY(var(--tx)) scale(var(--scene-scale));
  transition:transform 0.5s cubic-bezier(.2,.8,.2,1);
  will-change:transform;
  opacity:0;animation:contentReveal 1.4s ease-out forwards;animation-delay:0.95s;
}
@keyframes contentReveal{to{opacity:1}}
.orbit-field{position:absolute;inset:0;transition:transform 0.5s cubic-bezier(.2,.8,.2,1);}
.ring{position:absolute;border-radius:50%;border:0.5px solid rgba(255,255,255,0.06);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* S ORBITAL */
.s-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:10;width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  animation:spulse 4s ease-in-out infinite;
}
@keyframes spulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.04)}}
.s-halo{position:absolute;inset:-70px;border-radius:50%;filter:blur(3px);
  background:radial-gradient(circle,rgba(253,255,237,0.12) 0%,rgba(239,112,27,0.07) 38%,transparent 72%);
  animation:halopulse 4s ease-in-out infinite;}
@keyframes halopulse{0%,100%{opacity:0.4}50%{opacity:0.9}}
.s-beam{
  position:absolute;top:-60vh;left:50%;width:1px;height:160vh;
  transform:translateX(-50%);pointer-events:none;mix-blend-mode:screen;opacity:0.55;
  background:linear-gradient(to bottom, transparent 0%, rgba(239,112,27,0.4) 42%, rgba(253,255,237,0.6) 50%, rgba(239,112,27,0.4) 58%, transparent 100%);
  animation:beamflicker 7s ease-in-out infinite;
}
@keyframes beamflicker{0%,100%{opacity:0.35}50%{opacity:0.65}}
.s-ring1{position:absolute;top:50%;left:50%;width:190px;height:66px;margin-left:-95px;margin-top:-33px;border-radius:50%;border:1px solid rgba(253,255,237,0.22);animation:sring1 12s linear infinite;}
@keyframes sring1{from{transform:rotateX(70deg) rotateZ(0deg)}to{transform:rotateX(70deg) rotateZ(360deg)}}
.s-ring2{position:absolute;top:50%;left:50%;width:210px;height:56px;margin-left:-105px;margin-top:-28px;border-radius:50%;border:0.5px solid rgba(239,112,27,0.28);animation:sring2 18s linear infinite reverse;}
@keyframes sring2{from{transform:rotateX(75deg) rotateZ(60deg)}to{transform:rotateX(75deg) rotateZ(420deg)}}

.s-dot1,.s-dot1-t,.s-dot1-t2{position:absolute;top:50%;left:50%;border-radius:50%;background:#FDFFED;animation:sdot1 12s linear infinite;}
.s-dot1{width:6px;height:6px;margin-left:-3px;margin-top:-3px;box-shadow:0 0 8px rgba(253,255,237,0.9);}
.s-dot1-t{width:4px;height:4px;margin-left:-2px;margin-top:-2px;opacity:0.35;filter:blur(0.5px);animation-delay:-0.35s;}
.s-dot1-t2{width:3px;height:3px;margin-left:-1.5px;margin-top:-1.5px;opacity:0.16;filter:blur(0.8px);animation-delay:-0.7s;}
@keyframes sdot1{0%{transform:rotateX(70deg) rotateZ(0deg) translateX(95px) rotateX(-70deg) rotateZ(0deg)}100%{transform:rotateX(70deg) rotateZ(360deg) translateX(95px) rotateX(-70deg) rotateZ(-360deg)}}

.s-dot2,.s-dot2-t,.s-dot2-t2{position:absolute;top:50%;left:50%;border-radius:50%;background:#EF701B;animation:sdot2 18s linear infinite reverse;}
.s-dot2{width:5px;height:5px;margin-left:-2.5px;margin-top:-2.5px;box-shadow:0 0 8px rgba(239,112,27,0.9);}
.s-dot2-t{width:3.5px;height:3.5px;margin-left:-1.75px;margin-top:-1.75px;opacity:0.32;filter:blur(0.5px);animation-delay:-0.5s;}
.s-dot2-t2{width:2.5px;height:2.5px;margin-left:-1.25px;margin-top:-1.25px;opacity:0.15;filter:blur(0.8px);animation-delay:-1s;}
@keyframes sdot2{0%{transform:rotateX(75deg) rotateZ(60deg) translateX(105px) rotateX(-75deg) rotateZ(-60deg)}100%{transform:rotateX(75deg) rotateZ(420deg) translateX(105px) rotateX(-75deg) rotateZ(-420deg)}}

/* SISTEMA DE ANÉIS GALÁTICOS — elipses 3D entrelaçadas, elegantes, ao fundo */
.galaxy-rings{position:absolute;top:50%;left:50%;width:0;height:0;z-index:6;pointer-events:none;}
.g-ring{position:absolute;border-radius:50%;transform-style:preserve-3d;}
.g-ring1{width:560px;height:190px;margin:-95px 0 0 -280px;border:0.5px solid rgba(253,255,237,0.10);
  animation:gring1 75s linear infinite;}
@keyframes gring1{from{transform:rotateX(73deg) rotateZ(12deg)}to{transform:rotateX(73deg) rotateZ(372deg)}}
.g-ring2{width:680px;height:250px;margin:-125px 0 0 -340px;border:0.5px solid rgba(239,112,27,0.09);
  animation:gring2 105s linear infinite reverse;}
@keyframes gring2{from{transform:rotateX(67deg) rotateZ(-30deg)}to{transform:rotateX(67deg) rotateZ(330deg)}}
.g-ring3{width:440px;height:400px;margin:-200px 0 0 -220px;border:0.5px solid rgba(253,255,237,0.07);
  animation:gring3 140s linear infinite;}
@keyframes gring3{from{transform:rotateX(58deg) rotateZ(68deg)}to{transform:rotateX(58deg) rotateZ(428deg)}}

.g-marker{position:absolute;top:50%;left:50%;width:4px;height:4px;margin:-2px 0 0 -2px;border-radius:50%;box-shadow:0 0 6px currentColor;}
.g-marker1{background:#FDFFED;color:#FDFFED;animation:gmark1 75s linear infinite;}
@keyframes gmark1{0%{transform:rotateX(73deg) rotateZ(12deg) translateX(280px) rotateX(-73deg) rotateZ(-12deg)}100%{transform:rotateX(73deg) rotateZ(372deg) translateX(280px) rotateX(-73deg) rotateZ(-372deg)}}
.g-marker2{background:#EF701B;color:#EF701B;animation:gmark2 105s linear infinite reverse;}
@keyframes gmark2{0%{transform:rotateX(67deg) rotateZ(-30deg) translateX(340px) rotateX(-67deg) rotateZ(30deg)}100%{transform:rotateX(67deg) rotateZ(330deg) translateX(340px) rotateX(-67deg) rotateZ(-330deg)}}

/* ÓRBITAS */
.orbit{position:absolute;top:50%;left:50%;width:0;height:0;z-index:8}
.o1{animation:orb1 18s linear infinite}
.o2{animation:orb2 24s linear infinite}
.o3{animation:orb3 30s linear infinite reverse}
.o4{animation:orb4 22s linear infinite}
@keyframes orb1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orb2{from{transform:rotate(120deg)}to{transform:rotate(480deg)}}
@keyframes orb3{from{transform:rotate(240deg)}to{transform:rotate(-120deg)}}
@keyframes orb4{from{transform:rotate(300deg)}to{transform:rotate(660deg)}}
.orb-sat{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;text-decoration:none;transform:translateY(-50%);}
.o1 .orb-sat{left:195px;animation:co1 18s linear infinite}
.o2 .orb-sat{left:165px;animation:co2 24s linear infinite}
.o3 .orb-sat{left:220px;animation:co3 30s linear infinite reverse}
.o4 .orb-sat{left:260px;animation:co4 22s linear infinite}
@keyframes co1{from{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(-360deg)}}
@keyframes co2{from{transform:translateY(-50%) rotate(-120deg)}to{transform:translateY(-50%) rotate(-480deg)}}
@keyframes co3{from{transform:translateY(-50%) rotate(-240deg)}to{transform:translateY(-50%) rotate(120deg)}}
@keyframes co4{from{transform:translateY(-50%) rotate(-300deg)}to{transform:translateY(-50%) rotate(-660deg)}}

/* anel cônico girando atrás de cada ícone — dá "vida" a um desenho estático */
.orb-ring-spin{
  position:absolute;top:0;left:50%;width:70px;height:70px;
  margin-top:-6px;transform:translateX(-50%);border-radius:50%;
  background:conic-gradient(from 0deg, transparent 0%, rgba(239,112,27,0.55) 6%, transparent 18%, transparent 100%);
  opacity:0.55;animation:ringspin 7s linear infinite;z-index:0;pointer-events:none;
}
@keyframes ringspin{to{transform:translateX(-50%) rotate(360deg)}}

.orb-icon{
  position:relative;z-index:1;
  width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(6,8,16,0.9);border:1.5px solid rgba(239,112,27,0.6);
  box-shadow:0 0 14px rgba(239,112,27,0.18);
  transition:border-color 0.3s, box-shadow 0.3s;
  animation:iconbreathe 5s ease-in-out infinite;
}
.o1 .orb-icon{animation-delay:0s}
.o2 .orb-icon{animation-delay:-1.3s}
.o3 .orb-icon{animation-delay:-2.6s}
.o4 .orb-icon{animation-delay:-3.9s}
@keyframes iconbreathe{
  0%,100%{box-shadow:0 0 14px rgba(239,112,27,0.18);filter:brightness(1)}
  50%{box-shadow:0 0 24px rgba(239,112,27,0.4);filter:brightness(1.12)}
}
.orb-icon::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:1px solid rgba(239,112,27,0.55);opacity:0;transform:scale(0.8);
  pointer-events:none;
}
.orb-sat:hover .orb-icon{border-color:#EF701B;box-shadow:0 0 30px rgba(239,112,27,0.5)}
.orb-sat:hover .orb-icon::after{animation:ringping 0.8s ease-out;}
@keyframes ringping{0%{opacity:0.85;transform:scale(0.8)}100%{opacity:0;transform:scale(1.7)}}
.orb-label{font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(239,112,27,0.75);font-weight:300;white-space:nowrap;transition:color 0.3s,letter-spacing 0.3s;}
.orb-sat:hover .orb-label{color:#FDFFED;letter-spacing:0.22em}

/* DOCK INFERIOR — EM BREVE */
.dock{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:center;gap:0;
  padding:0 clamp(16px,4vw,40px);height:clamp(64px,11vw,90px);
  border-top:0.5px solid rgba(253,255,237,0.07);
  background:rgba(6,8,16,0.5);
  backdrop-filter:blur(8px);
  flex-shrink:0;
  opacity:0;animation:dockIn 1s ease-out forwards;animation-delay:1.6s;
}
@keyframes dockIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.dock-label{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(253,255,237,0.2);white-space:nowrap;
}
.dock-items{display:flex;gap:clamp(18px,4vw,32px);align-items:center}
.dock-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:default;opacity:0.4;transition:opacity 0.35s;
  position:relative;
}
.dock-item:hover{opacity:0.8}
.dock-icon{
  width:clamp(38px,8vw,46px);height:clamp(38px,8vw,46px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(6,8,16,0.8);
  border:1px solid rgba(253,255,237,0.1);
  transition:border-color 0.35s;
  position:relative;
  animation:dockbreathe 6s ease-in-out infinite;
}
@keyframes dockbreathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
.dock-item:hover .dock-icon{border-color:rgba(253,255,237,0.3)}
.dock-name{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(253,255,237,0.35)}
.soon-tag{
  display:none;position:absolute;top:-24px;left:50%;transform:translateX(-50%);
  font-size:7px;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(253,255,237,0.6);white-space:nowrap;
  background:rgba(6,8,16,0.9);padding:3px 8px;border-radius:20px;
  border:0.5px solid rgba(253,255,237,0.15);
}
.dock-item:hover .soon-tag{display:block}

/* RESPONSIVIDADE — a cena orbital inteira escala como um bloco único */
@media (max-width:900px){:root{--scene-scale:0.78}}
@media (max-width:600px){:root{--scene-scale:0.58}}
@media (max-width:420px){:root{--scene-scale:0.46}}
@media (max-height:520px){:root{--scene-scale:0.5}}
@media (max-width:600px){
  .header-right{display:none}
}
@media (prefers-reduced-motion: reduce){
  .scene-content{transition:none}
}
</style>
</head>
<body>

<!-- INTRO: sensação de aproximação ao planeta -->
<div class="intro" id="intro">
  <div class="intro-flare"></div>
  <div class="intro-core"></div>
</div>

<!-- GRAIN cinematográfico -->
<div class="grain"></div>

<!-- HEADER -->

<script>
// intro: remove do DOM ao terminar, ou ao clicar (pular)
var intro=document.getElementById('intro');
if(intro){
  function clearIntro(){intro.remove();}
  intro.addEventListener('animationend',clearIntro);
  intro.addEventListener('click',clearIntro);
  setTimeout(clearIntro,2700);
}

// estrelas
var scene=document.getElementById('sc');
var starfield=document.getElementById('starfield');
var stars=[];
for(var i=0;i<160;i++){
  var s=document.createElement('div');
  s.className='star';
  var sz=Math.random()*1.8+0.3;
  var leftPct=Math.random()*100, topPct=Math.random()*100;
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+topPct+'%;left:'+leftPct+'%;opacity:'+(Math.random()*0.45+0.05);
  starfield.appendChild(s);
  stars.push({el:s,leftPct:leftPct,topPct:topPct});
}

// poeira cósmica flutuando — textura orgânica
var dust=document.getElementById('dust');
var dustAnims=['dustfloat1','dustfloat2','dustfloat3'];
var dustColors=['rgba(253,255,237,0.16)','rgba(239,112,27,0.14)','rgba(253,255,237,0.1)'];
for(var d=0;d<9;d++){
  var p=document.createElement('div');
  p.className='dust-p';
  var psz=6+Math.random()*10;
  var anim=dustAnims[d%dustAnims.length];
  var dur=(28+Math.random()*30).toFixed(1);
  var delay=(-Math.random()*dur).toFixed(1);
  p.style.cssText='width:'+psz+'px;height:'+psz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;'+
    'background:'+dustColors[d%dustColors.length]+';filter:blur('+(2+Math.random()*2).toFixed(1)+'px);'+
    'animation:'+anim+' '+dur+'s ease-in-out infinite;animation-delay:'+delay+'s;';
  dust.appendChild(p);
}

// parallax 3D do sistema (S + anéis) + camada extra de profundidade nas órbitas + estrelas reagindo ao cursor
var sceneContent=document.getElementById('sceneContent');
var orbitField=document.getElementById('orbitField');
var canHover=window.matchMedia('(hover:hover)').matches;
var reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

var mouseX=0, mouseY=0, sceneW=0, sceneH=0, rafPending=false;
var STAR_RADIUS=130, STAR_STRENGTH=20;

function updateStars(){
  rafPending=false;
  for(var i=0;i<stars.length;i++){
    var st=stars[i];
    var px=(st.leftPct/100)*sceneW, py=(st.topPct/100)*sceneH;
    var dx=px-mouseX, dy=py-mouseY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<STAR_RADIUS && dist>0.01){
      var f=(1-dist/STAR_RADIUS)*STAR_STRENGTH;
      st.el.style.transform='translate('+((dx/dist)*f).toFixed(1)+'px,'+((dy/dist)*f).toFixed(1)+'px)';
    } else if(st.el.style.transform){
      st.el.style.transform='';
    }
  }
}

if(canHover && !reduceMotion){
  scene.addEventListener('mousemove',function(e){
    var r=scene.getBoundingClientRect();
    sceneW=r.width;sceneH=r.height;
    var x=(e.clientX-r.left)/r.width;
    var y=(e.clientY-r.top)/r.height;
    mouseX=x*r.width;mouseY=y*r.height;

    var tx=(x-0.5)*16;
    var ty=(0.5-y)*16;
    sceneContent.style.setProperty('--tx',tx+'deg');
    sceneContent.style.setProperty('--ty',ty+'deg');
    orbitField.style.transform='rotate('+((x-0.5)*6)+'deg)';

    if(!rafPending){rafPending=true;requestAnimationFrame(updateStars);}
  });
  scene.addEventListener('mouseleave',function(){
    sceneContent.style.setProperty('--tx','0deg');
    sceneContent.style.setProperty('--ty','0deg');
    orbitField.style.transform='rotate(0deg)';
    for(var i=0;i<stars.length;i++){stars[i].el.style.transform='';}
  });
}
</script>
